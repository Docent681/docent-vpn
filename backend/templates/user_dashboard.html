{% endblock %}

{% block body %}
<h1>Личный кабинет </h1>
<hr>
<h2>Доступные ключи</h2>
<table>
    <tr>
        <th>Ключ</th>
        <th>Отозвать</th>
    </tr>
    <tr>

        <td>Плейсхолдер</td>

<form action="{{ url_for('user_dashboard') }}" method="POST">
    <p>
        <label for="key_amount">Количество ключей: </label>
        <input type="number" id="key_amount" name="key_amount" required>
    </p>

    <p>
        <label for="description">Краткое описание запроса: </label>
        <input type="text" id="descriprion" name="description" required>
    </p>

    <p>
        <button type="submit">Запросить</button>
    </p>
</form>
<h2>Обратная связь от администратора</h2>

</p>
